<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vocal Master Pro</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        canvas { width: 100%; height: 150px; background: #111; border-bottom: 2px solid #6200ee; }
        #status { font-size: 4rem; font-weight: bold; margin: 20px 0; }
        .controls { padding: 20px; }
        .correto { color: #4caf50; }
        .erro { color: #f44336; }
    </style>
</head>
<body>

    <canvas id="visualizador"></canvas>
    <div id="status">--</div>
    
    <div class="controls">
        <input type="file" id="uploadMusica" accept="audio/*">
        <audio id="playerAudio" controls></audio>
        <br><br>
        <button id="btnIniciar">Ligar Microfone</button>
    </div>

    <script>
        const canvas = document.getElementById('visualizador');
        const ctx = canvas.getContext('2d');
        let audioContext, analyser, dataArray, pitch;

        // Configuração do Visualizador (Osciloscópio)
        function desenharOnda() {
            requestAnimationFrame(desenharOnda);
            analyser.getByteTimeDomainData(dataArray);
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#03dac6';
            ctx.beginPath();
            let sliceWidth = canvas.width / 128;
            let x = 0;
            for (let i = 0; i < 128; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        document.getElementById('btnIniciar').addEventListener('click', async () => {
            audioContext = new AudioContext();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.fftSize);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            pitch = ml5.pitchDetection('https://cdn.jsdelivr.net/gh/ml5js/ml5-data-and-models/models/pitch-detection/crepe/', audioContext, stream, () => {
                desenharOnda();
                loop();
            });
        });

        function loop() {
            pitch.getPitch((err, frequency) => {
                if (frequency) {
                    const note = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"][Math.round(12 * Math.log2(frequency / 440) + 69) % 12];
                    const status = document.getElementById('status');
                    status.innerText = note;
                    status.className = "correto";
                }
                loop();
            });
        }
    </script>
</body>
</html>
