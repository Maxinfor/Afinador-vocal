<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>App de Afinação</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #status { padding: 20px; font-size: 24px; margin: 20px; border-radius: 10px; }
        .correto { background-color: #d4edda; color: #155724; }
        .erro { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h1>Detector de Campo Harmônico</h1>
    <button id="btn">Ligar Microfone</button>
    <div id="status">Pressione para começar</div>

    <script>
        const campoHarmonico = ["C", "D", "E", "F", "G", "A", "B"];
        let audioContext, pitch;

        document.getElementById('btn').addEventListener('click', async () => {
            audioContext = new AudioContext();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Inicializa o ml5.js
            pitch = ml5.pitchDetection('./model', audioContext, stream, () => {
                document.getElementById('status').innerText = "Ouvindo...";
                getPitch();
            });
        });

        function getPitch() {
            pitch.getPitch((err, frequency) => {
                if (frequency) {
                    // ml5 retorna a frequência, vamos simplificar para a nota
                    // Aqui você faria a conversão de Hz para nota (ex: 261Hz -> C)
                    // Para simplificar, vamos exibir a frequência:
                    let nota = "C"; // Exemplo fixo por enquanto
                    
                    if (campoHarmonico.includes(nota)) {
                        document.getElementById('status').innerText = "Dentro do campo: " + nota;
                        document.getElementById('status').className = "correto";
                    } else {
                        document.getElementById('status').innerText = "Fora do tom!";
                        document.getElementById('status').className = "erro";
                    }
                }
                getPitch(); // Loop contínuo
            });
        }
    </script>
</body>
</html>
