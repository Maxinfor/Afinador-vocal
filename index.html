<!DOCTYPE html>
<html lang="pt-br">
<head>

        #status { padding: 20px; font-size: 20px; margin: 20px auto; border-radius: 10px; max-width: 300px; }
        .correto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        select, button { padding: 10px; margin: 5px; font-size: 16px; }
    </style>
</head>

    <h1>Detector de Campo</h1>
    
    <label>Escolha o Campo:</label>
    <select id="tonalidade">
        <optgroup label="Maiores">
            <option value="C">Dó Maior (C)</option>
            <option value="G">Sol Maior (G)</option>
            <option value="D">Ré Maior (D)</option>
        </optgroup>
        <optgroup label="Menores">
            <option value="Am">Lá Menor (Am)</option>
            <option value="Em">Mi Menor (Em)</option>
        </optgroup>
    </select>
    <button onclick="atualizarCampo()">Aplicar</button>
    <br><br>
    <button id="btnIniciar">Ligar Microfone</button>
    <div id="status" class="correto">Aguardando...</div>
    <p id="notasList"></p>

    <script>
        const dicionarioEscalas = {
            "C": ["C", "D", "E", "F", "G", "A", "B"],
            "G": ["G", "A", "B", "C", "D", "E", "F#"],
            "D": ["D", "E", "F#", "G", "A", "B", "C#"],
            "Am": ["A", "B", "C", "D", "E", "F", "G"],
            "Em": ["E", "F#", "G", "A", "B", "C", "D"]
        };

        let campoAtivo = dicionarioEscalas["C"];
        let audioContext, pitch;

        function atualizarCampo() {
            const selecao = document.getElementById('tonalidade').value;
            campoAtivo = dicionarioEscalas[selecao];
            document.getElementById('notasList').innerText = "Notas: " + campoAtivo.join(", ");
        }

        function frequencyToNote(frequency) {
            const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const midiNumber = Math.round(12 * Math.log2(frequency / 440) + 69);
            return noteNames[midiNumber % 12];
